<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AI Hair Salon Agent 系统架构</title>
  <desc id="desc">FastAPI 在入口解析可选 JWT 账户或游客身份，中心路由协调预约与咨询 Agent。预约链路通过确定性业务服务、SQLite 事务和并发保护生成预约编号；咨询链路通过 MCP 调用独立 RAG 知识服务并返回来源引用；天气仅在聊天预约成功后非阻塞调用。</desc>

  <defs>
    <marker id="arrow-slate" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#059669"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d97706"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .page-title { font-size: 30px; font-weight: 700; }
      .page-subtitle { font-size: 15px; fill: #475569; }
      .principle { font-size: 16px; font-weight: 700; fill: #1e3a8a; }
      .lane-title { font-size: 20px; font-weight: 700; }
      .node-title { font-size: 17px; font-weight: 700; }
      .node-text { font-size: 14px; fill: #475569; }
      .tiny { font-size: 13px; fill: #64748b; }
      .entry-node { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; }
      .booking-node { fill: #ffffff; stroke: #60a5fa; stroke-width: 1.5; }
      .consult-node { fill: #ffffff; stroke: #34d399; stroke-width: 1.5; }
      .data-node { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.7; }
      .weather-node { fill: #fffbeb; stroke: #f59e0b; stroke-width: 1.5; }
      .arrow { fill: none; stroke: #475569; stroke-width: 2; marker-end: url(#arrow-slate); }
      .booking-arrow { fill: none; stroke: #2563eb; stroke-width: 2.2; marker-end: url(#arrow-blue); }
      .consult-arrow { fill: none; stroke: #059669; stroke-width: 2.2; marker-end: url(#arrow-green); }
      .weather-arrow { fill: none; stroke: #d97706; stroke-width: 2; stroke-dasharray: 7 6; marker-end: url(#arrow-amber); }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#f8fafc"/>

  <text x="48" y="45" class="page-title">AI Hair Salon Agent 系统架构</text>
  <text x="48" y="71" class="page-subtitle">中心路由协调的 Agentic Workflow：自然语言理解与确定性业务执行分离</text>

  <rect x="1000" y="23" width="550" height="54" rx="8" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="1275" y="46" text-anchor="middle" class="principle">Agent 负责理解 · 业务服务负责决策</text>
  <text x="1275" y="66" text-anchor="middle" class="principle">SQLite 负责保存事实</text>

  <!-- Request entry and central routing -->
  <rect x="48" y="112" width="190" height="94" rx="8" class="entry-node"/>
  <text x="143" y="146" text-anchor="middle" class="node-title">用户 / Web / API</text>
  <text x="143" y="172" text-anchor="middle" class="node-text">自然语言与结构化请求</text>

  <rect x="298" y="112" width="190" height="94" rx="8" class="entry-node"/>
  <text x="393" y="146" text-anchor="middle" class="node-title">FastAPI</text>
  <text x="393" y="172" text-anchor="middle" class="node-text">Web · REST · Auth / CSRF</text>

  <rect x="548" y="112" width="280" height="94" rx="8" class="entry-node"/>
  <text x="688" y="143" text-anchor="middle" class="node-title">身份与 Session 边界</text>
  <text x="688" y="168" text-anchor="middle" class="node-text">Auth / Chat / owner 三者分离</text>
  <text x="688" y="188" text-anchor="middle" class="tiny">JWT sid 校验 · async lock · TTL</text>

  <rect x="888" y="112" width="300" height="94" rx="8" class="entry-node"/>
  <text x="1038" y="143" text-anchor="middle" class="node-title">TaskClassificationAgent</text>
  <text x="1038" y="168" text-anchor="middle" class="node-text">规则预路由 + LLM 辅助理解</text>
  <text x="1038" y="188" text-anchor="middle" class="tiny">中心协调 Booking / Consultation</text>

  <path d="M238 159 H298" class="arrow"/>
  <path d="M488 159 H548" class="arrow"/>
  <path d="M828 159 H888" class="arrow"/>

  <!-- Booking lane -->
  <rect x="30" y="246" width="1540" height="374" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="55" y="279" class="lane-title" fill="#1d4ed8">预约链路 · Booking</text>
  <text x="286" y="279" class="tiny">理解约束 → 查询候选 → 用户选择 → 最终确认 → 原子写入</text>

  <path d="M988 206 V228 H150 V310" class="booking-arrow"/>
  <text x="796" y="225" class="tiny" fill="#2563eb">create_booking · search_availability · 生命周期操作</text>

  <rect x="55" y="310" width="190" height="105" rx="8" class="booking-node"/>
  <text x="150" y="344" text-anchor="middle" class="node-title">AppointmentAgent</text>
  <text x="150" y="370" text-anchor="middle" class="node-text">多轮预约状态</text>
  <text x="150" y="391" text-anchor="middle" class="tiny">选择与确认语义</text>

  <rect x="280" y="310" width="220" height="105" rx="8" class="booking-node"/>
  <text x="390" y="344" text-anchor="middle" class="node-title">规则解析 + LLM 辅助</text>
  <text x="390" y="370" text-anchor="middle" class="node-text">日期 · 时间 · 服务</text>
  <text x="390" y="391" text-anchor="middle" class="tiny">发型师 · 专长 · Slot Filling</text>

  <rect x="535" y="310" width="190" height="105" rx="8" class="booking-node"/>
  <text x="630" y="344" text-anchor="middle" class="node-title">SERVICE_CATALOG</text>
  <text x="630" y="370" text-anchor="middle" class="node-text">标准价格与时长</text>
  <text x="630" y="391" text-anchor="middle" class="tiny">结构化服务事实</text>

  <rect x="760" y="310" width="205" height="105" rx="8" class="booking-node"/>
  <text x="862.5" y="344" text-anchor="middle" class="node-title">AvailabilityService</text>
  <text x="862.5" y="370" text-anchor="middle" class="node-text">服务能力 · 真实排班</text>
  <text x="862.5" y="391" text-anchor="middle" class="tiny">精确时间 / 时间范围候选</text>

  <rect x="1000" y="310" width="230" height="105" rx="8" class="booking-node"/>
  <text x="1115" y="344" text-anchor="middle" class="node-title">候选选择与最终确认</text>
  <text x="1115" y="370" text-anchor="middle" class="node-text">Session 保存交互上下文</text>
  <text x="1115" y="391" text-anchor="middle" class="tiny">不自动分配发型师</text>

  <rect x="1265" y="310" width="255" height="105" rx="8" class="booking-node"/>
  <text x="1392.5" y="344" text-anchor="middle" class="node-title">AppointmentService</text>
  <text x="1392.5" y="370" text-anchor="middle" class="node-text">统一创建 / 查询 / 取消 / 修改</text>
  <text x="1392.5" y="391" text-anchor="middle" class="tiny">业务校验与类型化结果</text>

  <path d="M245 362.5 H280" class="booking-arrow"/>
  <path d="M500 362.5 H535" class="booking-arrow"/>
  <path d="M725 362.5 H760" class="booking-arrow"/>
  <path d="M965 362.5 H1000" class="booking-arrow"/>
  <path d="M1230 362.5 H1265" class="booking-arrow"/>

  <rect x="690" y="470" width="365" height="105" rx="8" class="booking-node"/>
  <text x="872.5" y="500" text-anchor="middle" class="node-title">原子事务与最终校验</text>
  <text x="872.5" y="526" text-anchor="middle" class="node-text">BEGIN IMMEDIATE · 二次冲突检查</text>
  <text x="872.5" y="548" text-anchor="middle" class="tiny">expected_version · SQLite Trigger · rollback</text>

  <rect x="1100" y="470" width="210" height="105" rx="8" class="data-node"/>
  <text x="1205" y="500" text-anchor="middle" class="node-title">SQLite</text>
  <text x="1205" y="526" text-anchor="middle" class="node-text">users · appointments</text>
  <text x="1205" y="548" text-anchor="middle" class="tiny">stylists · stylist_schedules</text>

  <rect x="1350" y="470" width="170" height="105" rx="8" class="data-node"/>
  <text x="1435" y="505" text-anchor="middle" class="node-title">预约成功</text>
  <text x="1435" y="532" text-anchor="middle" class="node-text">真实 appointment_id</text>
  <text x="1435" y="553" text-anchor="middle" class="tiny">COMMIT 后返回</text>

  <path d="M1392.5 415 V445 H872.5 V470" class="booking-arrow"/>
  <path d="M1055 522.5 H1100" class="booking-arrow"/>
  <path d="M1310 522.5 H1350" class="booking-arrow"/>

  <!-- Consultation lane -->
  <rect x="30" y="650" width="1540" height="176" rx="8" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.5"/>
  <text x="55" y="683" class="lane-title" fill="#047857">知识咨询链路 · Consultation</text>

  <path d="M1088 206 H1550 V632 H160 V705" class="consult-arrow"/>

  <rect x="55" y="705" width="210" height="88" rx="8" class="consult-node"/>
  <text x="160" y="739" text-anchor="middle" class="node-title">ConsultantAgent</text>
  <text x="160" y="765" text-anchor="middle" class="node-text">知识问题与回答组织</text>

  <rect x="315" y="705" width="235" height="88" rx="8" class="consult-node"/>
  <text x="432.5" y="739" text-anchor="middle" class="node-title">MCPKnowledgeGateway</text>
  <text x="432.5" y="765" text-anchor="middle" class="node-text">ClientSession · stdio</text>

  <rect x="600" y="705" width="260" height="88" rx="8" class="consult-node"/>
  <text x="730" y="739" text-anchor="middle" class="node-title">MCP Knowledge Service</text>
  <text x="730" y="765" text-anchor="middle" class="node-text">query_knowledge_hub</text>

  <rect x="910" y="705" width="250" height="88" rx="8" class="consult-node"/>
  <text x="1035" y="739" text-anchor="middle" class="node-title">RAG 检索与融合</text>
  <text x="1035" y="765" text-anchor="middle" class="node-text">Dense + BM25 + RRF</text>

  <rect x="1210" y="705" width="220" height="88" rx="8" class="consult-node"/>
  <text x="1320" y="739" text-anchor="middle" class="node-title">回答 + Citations</text>
  <text x="1320" y="765" text-anchor="middle" class="node-text">来源可追溯</text>

  <path d="M265 749 H315" class="consult-arrow"/>
  <path d="M550 749 H600" class="consult-arrow"/>
  <path d="M860 749 H910" class="consult-arrow"/>
  <path d="M1160 749 H1210" class="consult-arrow"/>

  <!-- Optional non-blocking weather post-processing -->
  <rect x="1090" y="846" width="430" height="42" rx="8" class="weather-node"/>
  <text x="1305" y="872" text-anchor="middle" class="node-title">Open-Meteo 上海天气提醒 · 失败不影响预约结果</text>
  <path d="M1435 575 V625 H1538 V867 H1520" class="weather-arrow"/>
  <text x="1450" y="614" class="tiny" fill="#b45309">仅聊天预约成功后</text>
</svg>
