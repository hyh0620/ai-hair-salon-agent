<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img" aria-label="AI Hair Salon Agent architecture">
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
    .service { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 8; }
    .rag { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
    .optional { fill: #f0f9ff; stroke: #0284c7; stroke-width: 2; stroke-dasharray: 6 4; rx: 8; }
    .text { font: 16px Arial, sans-serif; fill: #0f172a; }
    .small { font: 13px Arial, sans-serif; fill: #334155; }
    .title { font: 24px Arial, sans-serif; font-weight: 700; fill: #0f172a; }
    .arrow { stroke: #475569; stroke-width: 2; marker-end: url(#arrow); fill: none; }
    .dashed { stroke-dasharray: 6 4; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569" />
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1120" height="640"/>
  <text class="title" x="40" y="48">AI Hair Salon Agent</text>

  <rect class="box" x="40" y="100" width="170" height="80"/>
  <text class="text" x="70" y="132">User Request</text>
  <text class="small" x="65" y="156">Web / API</text>

  <rect class="box" x="270" y="90" width="190" height="100"/>
  <text class="text" x="320" y="124">FastAPI</text>
  <text class="small" x="298" y="150">routes, Swagger</text>
  <text class="small" x="300" y="170">trace_id, health</text>

  <rect class="box" x="530" y="70" width="220" height="90"/>
  <text class="text" x="570" y="105">Task / Agent Layer</text>
  <text class="small" x="558" y="132">classification and dialog</text>

  <rect class="service" x="520" y="230" width="250" height="130"/>
  <text class="text" x="552" y="264">Deterministic Booking</text>
  <text class="small" x="548" y="292">service_catalog + SQLite</text>
  <text class="small" x="548" y="316">stylist schedule checks</text>
  <text class="small" x="548" y="340">price, duration, conflicts</text>

  <rect class="rag" x="820" y="80" width="250" height="130"/>
  <text class="text" x="858" y="115">MCP Knowledge Gateway</text>
  <text class="small" x="850" y="143">ClientSession + stdio_client</text>
  <text class="small" x="850" y="167">query_knowledge_hub</text>
  <text class="small" x="850" y="191">503 on MCP unavailable</text>

  <rect class="rag" x="820" y="270" width="250" height="170"/>
  <text class="text" x="862" y="304">MCP Knowledge Service</text>
  <text class="small" x="850" y="334">Dense Retrieval</text>
  <text class="small" x="850" y="358">BM25</text>
  <text class="small" x="850" y="382">RRF Fusion</text>
  <text class="small" x="850" y="406">citations</text>

  <rect class="service" x="520" y="430" width="250" height="110"/>
  <text class="text" x="568" y="464">Business Database</text>
  <text class="small" x="570" y="492">appointments</text>
  <text class="small" x="570" y="516">stylists and schedules</text>

  <rect class="box" x="270" y="430" width="190" height="110"/>
  <text class="text" x="300" y="464">Appointment Success</text>
  <text class="small" x="304" y="492">normal booking message</text>
  <text class="small" x="308" y="516">weather may be omitted</text>

  <rect class="optional" x="40" y="430" width="180" height="110"/>
  <text class="text" x="74" y="464">Optional Weather</text>
  <text class="small" x="72" y="492">External API context</text>
  <text class="small" x="80" y="516">post-booking only</text>

  <path class="arrow" d="M210 140 L270 140"/>
  <path class="arrow" d="M460 140 L530 120"/>
  <path class="arrow" d="M640 160 L640 230"/>
  <path class="arrow" d="M750 115 L820 130"/>
  <path class="arrow" d="M945 210 L945 270"/>
  <path class="arrow" d="M645 360 L645 430"/>
  <path class="arrow" d="M820 360 L770 330"/>
  <path class="arrow" d="M270 165 C220 250 220 430 520 485"/>
  <path class="arrow" d="M520 300 C430 330 365 380 365 430"/>
  <path class="arrow dashed" d="M270 485 L220 485"/>
</svg>
