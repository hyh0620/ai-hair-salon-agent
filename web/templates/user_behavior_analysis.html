<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户行为分析 - 智能预约系统</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            padding: 30px;
            color: white;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: shimmer 3s infinite;
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }
        
        .header h2 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .content {
            padding: 30px;
        }
        
        .analysis-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        
        .analysis-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: shimmer 4s infinite;
        }
        
        .refresh-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 14px;
        }
        
        .refresh-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        
        .analysis-status {
            font-size: 13px;
            color: rgba(255,255,255,0.9);
            margin-top: 10px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.9);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        
        .stat-title {
            color: #666;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .stat-value.primary { color: #4facfe; }
        .stat-value.success { color: #11998e; }
        .stat-value.warning { color: #f093fb; }
        .stat-value.info { color: #667eea; }
        
        .reminder-section {
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(248,250,252,0.9));
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .reminder-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .send-reminder-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            border-radius: 25px;
            padding: 15px 35px;
            font-weight: bold;
            color: white;
            transition: all 0.3s ease;
            cursor: pointer;
            font-size: 16px;
            box-shadow: 0 8px 25px rgba(245, 87, 108, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .send-reminder-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            transition: all 0.3s ease;
            transform: translate(-50%, -50%);
        }
        
        .send-reminder-btn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .send-reminder-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(245, 87, 108, 0.4);
        }
        
        .reminder-message {
            background: linear-gradient(135deg, rgba(17, 153, 142, 0.1), rgba(56, 239, 125, 0.1));
            border-left: 4px solid #11998e;
            border-radius: 0 15px 15px 0;
            padding: 25px;
            margin-top: 25px;
            font-size: 16px;
            line-height: 1.6;
        }
        
        .loading {
            opacity: 0.6;
            pointer-events: none;
            position: relative;
        }
        
        .loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            border: 3px solid #4facfe;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            transform: translate(-50%, -50%);
        }
        
        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        
        .nav-link {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        .nav-link:hover, .nav-link.active {
            background: rgba(255,255,255,0.2);
            color: white;
            transform: translateY(-1px);
        }

        .reminder-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .viewer-card {
            min-width: 0;
            text-align: center;
        }

        .viewer-label {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .viewer-name {
            color: #667eea;
            font-size: 28px;
            font-weight: bold;
            line-height: 1.2;
            overflow-wrap: anywhere;
        }

        .viewer-mode {
            color: #666;
            font-size: 13px;
            margin-top: 4px;
        }

        .actions {
            text-align: center;
            margin-top: 30px;
        }

        .nav-btn {
            padding: 12px 30px;
            border-radius: 25px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            font-size: 16px;
            font-weight: 500;
            box-shadow: 0 8px 25px rgba(79, 172, 254, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(79, 172, 254, 0.4);
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                width: 100%;
                border-radius: 15px;
            }

            .header,
            .content,
            .analysis-card,
            .reminder-section {
                padding: 20px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .reminder-controls {
                align-items: stretch;
                flex-direction: column;
            }

            .send-reminder-btn,
            .refresh-btn {
                width: 100%;
            }
        }

        @media (max-width: 420px) {
            .header h2 {
                font-size: 23px;
            }

            .content,
            .analysis-card,
            .reminder-section,
            .stat-card {
                padding: 16px;
            }

            .nav-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2><i class="fas fa-chart-line"></i> 用户行为分析</h2>
            <p>基于历史预约数据的智能分析</p>
        </div>
        
        <div class="content">
            <div class="analysis-card">
                <h3 style="margin-bottom: 15px;"><i class="fas fa-search"></i> 个人偏好概览</h3>
                <button onclick="loadUserAnalysis()" class="refresh-btn">
                    <i class="fas fa-sync-alt"></i> 手动刷新数据
                </button>
                <div id="analysis-status" class="analysis-status" aria-live="polite">正在加载分析数据……</div>
            </div>

            <!-- 用户分析数据 -->
            <div class="stats-grid" id="analysisData">
                <div class="stat-card">
                    <div class="stat-title">最喜欢的发型师</div>
                    <div id="favoriteStylist" class="stat-value primary">暂无数据</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">常用服务项目</div>
                    <div id="favoriteService" class="stat-value success">暂无数据</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">常用时长</div>
                    <div id="favoriteDuration" class="stat-value warning">暂无数据</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">距离上次预约</div>
                    <div id="daysSinceLastAppointment" class="stat-value info">暂无数据</div>
                </div>
            </div>
            
            <!-- 推送提醒功能 -->
            <div class="reminder-section">
                <div class="reminder-title">
                    <i class="fas fa-bell"></i> 智能推送提醒
                </div>
                <div class="reminder-controls">
                    <div>
                        <p style="color: #666; margin: 0;">基于用户偏好生成个性化回访消息</p>
                        <span id="reminderStatus" class="badge" style="background: #6c757d; color: white; padding: 4px 12px; border-radius: 12px; font-size: 12px; margin-top: 8px;">等待分析</span>
                    </div>
                    <button id="sendReminderBtn" class="send-reminder-btn" onclick="sendReminder()">
                        <i class="fas fa-paper-plane"></i> 生成回访消息
                    </button>
                </div>

                <!-- 提醒消息显示区域 -->
                <div id="reminderMessage" class="reminder-message" style="display: none;">
                    <h5 style="color: #11998e; margin-bottom: 15px;"><i class="fas fa-comment-dots"></i> 生成的回访消息：</h5>
                    <p id="messageContent" style="margin-bottom: 15px; color: #333; font-size: 16px;"></p>
                    <div id="availableTimes"></div>
                </div>
                
                <!-- 用户统计信息 -->
                <div style="margin-top: 30px; padding: 25px; background: rgba(255,255,255,0.8); border-radius: 15px; border: 1px solid rgba(255,255,255,0.3);">
                    <h4 style="color: #333; margin-bottom: 20px;"><i class="fas fa-chart-bar"></i> 用户统计信息</h4>
                    <div class="stats-grid" style="margin: 0;">
                        <div style="text-align: center;">
                            <div id="totalAppointments" style="font-size: 28px; font-weight: bold; color: #4facfe; margin-bottom: 8px;">0</div>
                            <div style="color: #666; font-size: 14px;">总预约次数</div>
                        </div>
                        <div style="text-align: center;">
                            <div id="shouldSendReminder" style="font-size: 28px; font-weight: bold; color: #11998e; margin-bottom: 8px;">否</div>
                            <div style="color: #666; font-size: 14px;">建议发送提醒</div>
                        </div>
                        <div class="viewer-card">
                            <div class="viewer-label">当前分析用户</div>
                            <div id="currentViewerName" class="viewer-name">游客</div>
                            <div id="currentViewerMode" class="viewer-mode">当前浏览器访客</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="actions">
                <a href="/" class="nav-btn">
                    <i class="fas fa-home"></i>
                    返回主界面
                </a>
            </div>
        </div>
    </div>

    <script src="/static/auth_refresh.js"></script>
    <script>
        const anonymousOwnerStorageKey = 'salon_anonymous_owner_id';
        const csrfCookieName = {{ csrf_cookie_name | tojson }};
        window.SalonAuthRefresh.configure({csrfCookieName});

        function createAnonymousOwnerId() {
            if (window.crypto && typeof window.crypto.randomUUID === 'function') {
                return window.crypto.randomUUID();
            }
            return `guest_${Date.now()}_${Math.random().toString(16).slice(2)}`;
        }

        function getAnonymousOwnerId() {
            let ownerId = window.localStorage.getItem(anonymousOwnerStorageKey);
            if (!ownerId) {
                ownerId = createAnonymousOwnerId();
                window.localStorage.setItem(anonymousOwnerStorageKey, ownerId);
            }
            return ownerId;
        }

        function csrfToken() {
            const prefix = `${encodeURIComponent(csrfCookieName)}=`;
            const entry = document.cookie.split('; ').find((item) => item.startsWith(prefix));
            return entry ? decodeURIComponent(entry.slice(prefix.length)) : '';
        }

        function identityHeaders({csrf = false} = {}) {
            const headers = {
                'Accept': 'application/json',
                'X-Anonymous-Owner-ID': getAnonymousOwnerId()
            };
            if (csrf) {
                const token = csrfToken();
                if (token) headers['X-CSRF-Token'] = token;
            }
            return headers;
        }

        // 页面加载时获取用户分析数据
        document.addEventListener('DOMContentLoaded', function() {
            loadUserAnalysis();
        });

        async function loadUserAnalysis() {
            const statusElement = document.getElementById('analysis-status');
            statusElement.textContent = '正在加载分析数据……';
            try {
                const response = await window.SalonAuthRefresh.fetch('/api/user-behavior/analysis', {
                    method: 'GET',
                    credentials: 'same-origin',
                    headers: identityHeaders()
                });
                if (!response.ok) {
                    throw new Error('analysis_request_failed');
                }

                const data = await response.json();
                const elements = {
                    'favoriteStylist': data.favorite_stylist_name || '暂无数据',
                    'favoriteService': data.favorite_service || '暂无数据',
                    'favoriteDuration': data.favorite_duration ? `${data.favorite_duration}分钟` : '暂无数据',
                    'daysSinceLastAppointment': data.days_since_last_appointment !== null ? `${data.days_since_last_appointment}天` : '暂无数据',
                    'totalAppointments': data.total_appointments || 0,
                    'shouldSendReminder': data.should_send_reminder ? '是' : '否'
                };

                Object.entries(elements).forEach(([id, value]) => {
                    const element = document.getElementById(id);
                    if (element) element.textContent = value;
                });

                const reminderStatus = document.getElementById('reminderStatus');
                if (reminderStatus) {
                    reminderStatus.textContent = data.should_send_reminder ? '建议发送' : '无需提醒';
                    reminderStatus.style.background = data.should_send_reminder ? '#11998e' : '#6c757d';
                }

                document.getElementById('currentViewerName').textContent = data.viewer.display_name;
                document.getElementById('currentViewerMode').textContent = data.viewer.mode === 'account'
                    ? '账户用户'
                    : '当前浏览器访客';
                statusElement.textContent = data.total_appointments > 0
                    ? `数据已更新，共 ${data.total_appointments} 次预约`
                    : '暂无历史预约数据';
            } catch (error) {
                console.error('加载用户分析数据失败');
                statusElement.textContent = '分析数据加载失败，请稍后重试。';
                const elements = ['favoriteStylist', 'favoriteService', 'favoriteDuration', 'daysSinceLastAppointment'];
                elements.forEach(id => {
                    const element = document.getElementById(id);
                    if (element) element.textContent = '暂无数据';
                });
            }
        }

        async function sendReminder() {
            try {
                const button = document.getElementById('sendReminderBtn');
                const originalText = button.innerHTML;
                button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 生成中...';
                button.disabled = true;
                button.classList.add('loading');
                
                const response = await window.SalonAuthRefresh.fetch('/api/user-behavior/send-reminder', {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: identityHeaders({csrf: true})
                });

                if (!response.ok) {
                    throw new Error('reminder_request_failed');
                }

                const data = await response.json();
                const messageDiv = document.getElementById('reminderMessage');
                const messageContent = document.getElementById('messageContent');
                const availableTimes = document.getElementById('availableTimes');
                messageContent.textContent = data.message || '提醒消息生成成功！';

                availableTimes.replaceChildren();
                if (data.stylist_available_times && data.stylist_available_times.length > 0) {
                    const label = document.createElement('strong');
                    label.textContent = '建议预约时间：';
                    availableTimes.append(label, document.createElement('br'));
                    data.stylist_available_times.forEach((time) => {
                        const item = document.createElement('span');
                        item.style.cssText = 'background:#f093fb;color:white;padding:4px 8px;border-radius:8px;margin:2px;display:inline-block;';
                        item.textContent = time.formatted || `${time.date || ''} ${time.time || ''}`.trim();
                        availableTimes.appendChild(item);
                    });
                }
                messageDiv.style.display = 'block';
                const statusElement = document.getElementById('reminderStatus');
                if (statusElement) {
                    statusElement.textContent = '已生成';
                    statusElement.style.background = '#11998e';
                }
            } catch (error) {
                console.error('生成回访消息失败');
                alert('生成回访消息失败，请稍后重试。');
            } finally {
                const button = document.getElementById('sendReminderBtn');
                button.innerHTML = '<i class="fas fa-paper-plane"></i> 生成回访消息';
                button.disabled = false;
                button.classList.remove('loading');
            }
        }

        window.addEventListener('salon-auth-expired', (event) => {
            const statusElement = document.getElementById('analysis-status');
            if (statusElement) {
                statusElement.textContent = event.detail?.message || '登录状态已失效，请重新登录';
            }
        });
    </script>
</body>
</html>
