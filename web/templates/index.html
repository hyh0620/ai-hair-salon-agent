<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能预约助手 - AI聊天机器人</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .chat-container { 
            width: 90%;
            max-width: 800px; 
            height: 90vh;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            padding: 20px 30px;
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: shimmer 3s infinite;
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }
        
        .header-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header-subtitle {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .nav-bar {
            background: rgba(255,255,255,0.98);
            padding: 15px 30px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        
        .nav-btn { 
            padding: 8px 16px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .nav-btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
        }

        .account-bar {
            min-height: 48px;
            padding: 8px 30px;
            background: #f8fafc;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .account-summary {
            min-width: 0;
            color: #344054;
            font-size: 13px;
        }

        .account-summary strong,
        .account-summary span {
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .account-summary span {
            margin-top: 2px;
            color: #667085;
            font-size: 12px;
        }

        .account-actions {
            display: flex;
            flex: 0 0 auto;
            gap: 8px;
        }

        .account-btn {
            padding: 7px 13px;
            border: 1px solid #d0d5dd;
            border-radius: 6px;
            background: #ffffff;
            color: #344054;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .account-btn.primary {
            border-color: #1570ef;
            background: #1570ef;
            color: #ffffff;
        }

        .account-btn:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        .auth-modal[hidden] {
            display: none;
        }

        .auth-modal {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(16, 24, 40, 0.55);
        }

        .auth-dialog {
            width: min(420px, 100%);
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            padding: 24px;
            border-radius: 8px;
            background: #ffffff;
            box-shadow: 0 24px 48px rgba(16, 24, 40, 0.24);
        }

        .auth-dialog-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
        }

        .auth-dialog h2 {
            color: #101828;
            font-size: 20px;
        }

        .auth-close {
            width: 34px;
            height: 34px;
            border: none;
            border-radius: 6px;
            background: #f2f4f7;
            color: #475467;
            cursor: pointer;
        }

        .auth-form {
            display: grid;
            gap: 14px;
        }

        .auth-field {
            display: grid;
            gap: 6px;
            color: #344054;
            font-size: 13px;
            font-weight: 600;
        }

        .auth-field[hidden] {
            display: none !important;
        }

        .auth-field input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d0d5dd;
            border-radius: 6px;
            color: #101828;
            font: inherit;
            font-weight: 400;
            outline: none;
        }

        .auth-field input:focus {
            border-color: #1570ef;
            box-shadow: 0 0 0 3px rgba(21, 112, 239, 0.12);
        }

        .auth-note {
            color: #667085;
            font-size: 12px;
            line-height: 1.5;
        }

        .auth-error {
            min-height: 18px;
            color: #b42318;
            font-size: 13px;
        }
        
        .chat-content {
            flex: 1;
            padding: 20px 30px;
            overflow-y: auto;
            background: linear-gradient(to bottom, rgba(255,255,255,0.9), rgba(248,250,252,0.9));
            scroll-behavior: smooth;
        }
        
        .chat-content::-webkit-scrollbar {
            width: 6px;
        }
        
        .chat-content::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.05);
            border-radius: 3px;
        }
        
        .chat-content::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 3px;
        }
        
        .message { 
            display: flex; 
            margin-bottom: 20px; 
            align-items: flex-end;
            animation: messageSlide 0.3s ease;
        }
        
        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user { 
            flex-direction: row-reverse; 
        }
        
        .avatar { 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 16px;
            font-weight: 600;
            margin: 0 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .message.user .avatar {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        
        .message.bot .avatar {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }
        
        .bubble { 
            max-width: 75%; 
            padding: 15px 20px; 
            border-radius: 20px; 
            font-size: 15px;
            line-height: 1.5;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .message.user .bubble { 
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white; 
            border-bottom-right-radius: 5px;
        }
        
        .message.bot .bubble { 
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
            color: #2c3e50; 
            border-bottom-left-radius: 5px;
            border: 2px solid rgba(79, 172, 254, 0.2);
            font-weight: 500;
        }
        
        /* 机器人回复中的特殊文本样式 */
        .bot-reply {
            color: #2c3e50;
            font-weight: 600;
        }
        
        .bot-thought {
            color: #7f8c8d;
            font-style: italic;
            font-size: 14px;
            opacity: 0.8;
        }
        
        .bot-success {
            color: #27ae60;
            font-weight: 700;
            background: linear-gradient(135deg, #d5f4e6 0%, #e8f8f5 100%);
            padding: 10px 15px;
            border-radius: 10px;
            margin: 5px 0;
            border-left: 4px solid #27ae60;
        }
        
        .bot-error {
            color: #e74c3c;
            font-weight: 600;
            background: linear-gradient(135deg, #fadbd8 0%, #f2d7d5 100%);
            padding: 10px 15px;
            border-radius: 10px;
            margin: 5px 0;
            border-left: 4px solid #e74c3c;
        }
        
        .bot-info {
            color: #3498db;
            font-weight: 600;
            background: linear-gradient(135deg, #d6eaf8 0%, #eaf4fd 100%);
            padding: 10px 15px;
            border-radius: 10px;
            margin: 5px 0;
            border-left: 4px solid #3498db;
        }
        
        .input-area {
            padding: 20px 30px;
            background: rgba(255,255,255,0.95);
            border-top: 1px solid rgba(0,0,0,0.05);
        }
        
        #chat-form { 
            display: flex; 
            gap: 15px;
            align-items: center;
        }
        
        #user-input { 
            flex: 1; 
            padding: 15px 20px; 
            border-radius: 25px; 
            border: 2px solid rgba(0,0,0,0.1); 
            font-size: 15px;
            background: white;
            transition: all 0.3s ease;
            outline: none;
            resize: none;
            max-height: 120px;
            overflow-y: auto;
        }
        
        #user-input:focus {
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
        }
        
        #user-input::placeholder {
            color: #999;
            opacity: 1;
        }
        
        #send-btn { 
            padding: 15px 25px; 
            border-radius: 25px; 
            border: none; 
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white; 
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        #send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 172, 254, 0.4);
        }
        
        #send-btn:active {
            transform: translateY(0);
        }
        
        .typing-indicator {
            display: none;
            padding: 15px 20px;
            background: white;
            border-radius: 20px;
            margin: 10px 0;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .typing-dots {
            display: inline-flex;
            gap: 4px;
        }
        
        .typing-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            animation: typing 1.4s infinite ease-in-out;
        }
        
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
            30% { transform: translateY(-10px); opacity: 1; }
        }
        
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .chat-container {
                width: 100%;
                height: 100vh;
                border-radius: 15px;
            }
            
            .header, .nav-bar, .chat-content, .input-area {
                padding-left: 20px;
                padding-right: 20px;
            }

            .account-bar {
                align-items: flex-start;
                padding-left: 20px;
                padding-right: 20px;
            }
            
            .nav-bar {
                justify-content: flex-start;
                overflow-x: auto;
                padding-bottom: 20px;
            }
            
            .bubble {
                max-width: 85%;
            }
            
            .header-title {
                font-size: 20px;
            }
            
            .header-subtitle {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- 头部区域 -->
        <div class="header">
            <div class="header-title">
                <i class="fas fa-robot"></i>
                智能预约助手
            </div>
            <div class="header-subtitle">
                AI驱动的理发店预约系统 - 为您提供便捷智能的预约体验
            </div>
        </div>
        
        <!-- 导航栏 -->
        <div class="nav-bar">
            <button class="nav-btn" onclick="window.location.href='/user_behavior'">
                <i class="fas fa-chart-line"></i>
                用户行为分析
            </button>
            <button class="nav-btn" onclick="window.location.href='/knowledge'">
                <i class="fas fa-database"></i>
                知识服务状态
            </button>
            <button class="nav-btn" onclick="window.location.href='/stylists'">
                <i class="fas fa-users"></i>
                发型师状态
            </button>
            <button class="nav-btn" onclick="window.location.href='/stylist-schedule'">
                <i class="fas fa-calendar-alt"></i>
                发型师排班
            </button>
            <button class="nav-btn" onclick="window.location.href='/status'">
                <i class="fas fa-heartbeat"></i>
                系统状态
            </button>
            <button class="nav-btn" id="clear-btn">
                <i class="fas fa-trash-alt"></i>
                清空对话
            </button>
        </div>

        <div class="account-bar" aria-live="polite">
            <div class="account-summary" id="account-summary">
                <strong>当前为游客模式</strong>
                <span>登录后的预约与游客预约分开，现有游客预约不会自动转移。</span>
            </div>
            <div class="account-actions">
                <button class="account-btn" id="login-btn" type="button">登录</button>
                <button class="account-btn primary" id="register-btn" type="button">注册</button>
                <button class="account-btn" id="logout-btn" type="button" hidden>退出登录</button>
            </div>
        </div>
        
        <!-- 聊天内容区域 -->
        <div class="chat-content" id="chat-box">
            <!-- 欢迎消息 -->
            <div class="message bot">
                <div class="avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="bubble">
                    <div class="bot-info">
                        👋 您好！我是智能预约助手，很高兴为您服务！
                    </div>
                    <div class="bot-reply">
                        我可以帮您：<br>
                        • 🕐 预约剪发、染发、烫发等服务<br>
                        • 👨‍💼 查询发型师状态<br>
                        • 📅 安排预约时间<br>
                        • ❓ 解答相关问题
                    </div>
                    <div class="bot-success">
                        请告诉我您需要什么帮助？
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 打字指示器 -->
        <div class="typing-indicator" id="typing-indicator">
            <div class="typing-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <span style="margin-left: 10px; color: #666;">AI正在思考中...</span>
        </div>
        
        <!-- 输入区域 -->
        <div class="input-area">
            <form id="chat-form">
                <input type="text" id="user-input" placeholder="请输入您的问题或需求..." autocomplete="off" required>
                <button id="send-btn" type="submit">
                    <i class="fas fa-paper-plane"></i>
                    发送
                </button>
            </form>
        </div>
    </div>

    <div class="auth-modal" id="auth-modal" role="dialog" aria-modal="true" aria-labelledby="auth-title" hidden>
        <div class="auth-dialog">
            <div class="auth-dialog-header">
                <h2 id="auth-title">登录账户</h2>
                <button class="auth-close" id="auth-close" type="button" aria-label="关闭账户窗口">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form class="auth-form" id="auth-form">
                <label class="auth-field" id="display-name-field" hidden>
                    显示名称
                    <input id="auth-display-name" name="display_name" type="text" maxlength="80" autocomplete="off" disabled>
                </label>
                <label class="auth-field">
                    邮箱
                    <input id="auth-email" name="email" type="email" maxlength="320" autocomplete="email" required>
                </label>
                <label class="auth-field">
                    密码
                    <input id="auth-password" name="password" type="password" minlength="8" maxlength="128" autocomplete="current-password" required>
                </label>
                <label class="auth-field" id="confirm-password-field" hidden>
                    确认密码
                    <input id="auth-confirm-password" name="confirm_password" type="password" minlength="8" maxlength="128" autocomplete="off" disabled>
                </label>
                <p class="auth-note" id="auth-note">登录后，账户预约由服务器验证的身份管理。</p>
                <div class="auth-error" id="auth-error" role="alert"></div>
                <button class="account-btn primary" id="auth-submit" type="submit">登录</button>
            </form>
        </div>
    </div>
    <script>
    const chatBox = document.getElementById('chat-box');
    const chatForm = document.getElementById('chat-form');
    const userInput = document.getElementById('user-input');
    const clearBtn = document.getElementById('clear-btn');
    const typingIndicator = document.getElementById('typing-indicator');
    const accountSummary = document.getElementById('account-summary');
    const loginBtn = document.getElementById('login-btn');
    const registerBtn = document.getElementById('register-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const authModal = document.getElementById('auth-modal');
    const authTitle = document.getElementById('auth-title');
    const authClose = document.getElementById('auth-close');
    const authForm = document.getElementById('auth-form');
    const authDisplayName = document.getElementById('auth-display-name');
    const authEmail = document.getElementById('auth-email');
    const authPassword = document.getElementById('auth-password');
    const authConfirmPassword = document.getElementById('auth-confirm-password');
    const displayNameField = document.getElementById('display-name-field');
    const confirmPasswordField = document.getElementById('confirm-password-field');
    const authNote = document.getElementById('auth-note');
    const authError = document.getElementById('auth-error');
    const authSubmit = document.getElementById('auth-submit');
    const sessionStorageKey = 'salon_chat_session_id';
    const ownerStorageKey = 'salon_anonymous_owner_id';
    const csrfCookieName = {{ csrf_cookie_name | tojson }};
    let lastBotBubble = null;
    let authMode = 'login';
    let authAvailable = true;
    const browserIdentity = getOrCreateBrowserIdentity();
    let sessionId = browserIdentity.sessionId;
    const ownerId = browserIdentity.ownerId;
    const initialWelcomeHtml = chatBox.innerHTML;

    function createSessionId() {
        if (window.crypto && typeof window.crypto.randomUUID === 'function') {
            return window.crypto.randomUUID();
        }
        return `session_${Date.now()}_${Math.random().toString(16).slice(2)}`;
    }

    function getOrCreateBrowserIdentity() {
        const existingSessionId = window.localStorage.getItem(sessionStorageKey);
        const existingOwnerId = window.localStorage.getItem(ownerStorageKey);
        let sessionId = existingSessionId;
        let ownerId = existingOwnerId;

        if (existingOwnerId) {
            if (!sessionId) {
                sessionId = createSessionId();
                window.localStorage.setItem(sessionStorageKey, sessionId);
            }
            return {sessionId, ownerId};
        }
        if (existingSessionId) {
            // Migrate appointments created by the previous single-ID browser contract.
            ownerId = existingSessionId;
        } else {
            sessionId = createSessionId();
            ownerId = createSessionId();
            while (ownerId === sessionId) ownerId = createSessionId();
            window.localStorage.setItem(sessionStorageKey, sessionId);
        }
        window.localStorage.setItem(ownerStorageKey, ownerId);
        return {sessionId, ownerId};
    }

    function csrfToken() {
        const prefix = `${encodeURIComponent(csrfCookieName)}=`;
        const entry = document.cookie.split('; ').find((item) => item.startsWith(prefix));
        return entry ? decodeURIComponent(entry.slice(prefix.length)) : '';
    }

    function requestHeaders({csrf = false} = {}) {
        const headers = {'Content-Type': 'application/json'};
        if (csrf) {
            const token = csrfToken();
            if (token) headers['X-CSRF-Token'] = token;
        }
        return headers;
    }

    function setSessionId(value) {
        if (!value) return;
        sessionId = value;
        window.localStorage.setItem(sessionStorageKey, sessionId);
    }

    function resetConversationView() {
        chatBox.innerHTML = initialWelcomeHtml;
        lastBotBubble = null;
    }

    function setAccountState(user) {
        if (user) {
            accountSummary.replaceChildren();
            const name = document.createElement('strong');
            name.textContent = user.display_name;
            const email = document.createElement('span');
            email.textContent = user.email;
            accountSummary.append(name, email);
            loginBtn.hidden = true;
            registerBtn.hidden = true;
            logoutBtn.hidden = false;
            return;
        }
        accountSummary.innerHTML = authAvailable
            ? '<strong>当前为游客模式</strong><span>登录后的预约与游客预约分开，现有游客预约不会自动转移。</span>'
            : '<strong>当前为游客模式</strong><span>账户认证尚未配置，游客预约仍可正常使用。</span>';
        loginBtn.hidden = false;
        registerBtn.hidden = false;
        loginBtn.disabled = !authAvailable;
        registerBtn.disabled = !authAvailable;
        logoutBtn.hidden = true;
    }

    async function refreshAccountState() {
        const response = await fetch('/api/auth/me', {credentials: 'same-origin'});
        if (response.ok) {
            const payload = await response.json();
            setAccountState(payload.data.user);
            return;
        }
        authAvailable = response.status !== 503;
        setAccountState(null);
    }

    function openAuthModal(mode) {
        authMode = mode;
        const registering = mode === 'register';
        authForm.reset();
        authTitle.textContent = registering ? '注册账户' : '登录账户';
        authSubmit.textContent = registering ? '注册并登录' : '登录';
        authNote.textContent = registering
            ? '注册后将切换到账户预约空间；现有游客预约不会自动转移。'
            : '登录后，账户预约由服务器验证的身份管理。';
        displayNameField.hidden = !registering;
        confirmPasswordField.hidden = !registering;
        authDisplayName.disabled = !registering;
        authConfirmPassword.disabled = !registering;
        authDisplayName.required = registering;
        authConfirmPassword.required = registering;
        authDisplayName.autocomplete = registering ? 'name' : 'off';
        authConfirmPassword.autocomplete = registering ? 'new-password' : 'off';
        authEmail.required = true;
        authEmail.autocomplete = 'email';
        authPassword.required = true;
        authPassword.autocomplete = registering ? 'new-password' : 'current-password';
        authError.textContent = '';
        authModal.hidden = false;
        (registering ? authDisplayName : authEmail).focus();
    }

    function closeAuthModal() {
        authModal.hidden = true;
        authForm.reset();
        authError.textContent = '';
    }

    function errorMessage(payload, fallback) {
        if (typeof payload?.detail === 'string') return payload.detail;
        if (Array.isArray(payload?.detail)) {
            return payload.detail[0]?.msg || fallback;
        }
        return fallback;
    }

    function addMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message ' + sender;
        
        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        if (sender === 'user') {
            avatar.innerHTML = '<i class="fas fa-user"></i>';
        } else {
            avatar.innerHTML = '<i class="fas fa-robot"></i>';
        }
        
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = text.replace(/\n/g, '<br>');
        
        msgDiv.appendChild(avatar);
        msgDiv.appendChild(bubble);
        chatBox.appendChild(msgDiv);
        
        // 平滑滚动到底部
        requestAnimationFrame(() => {
            chatBox.scrollTo({
                top: chatBox.scrollHeight,
                behavior: 'smooth'
            });
        });
        
        if (sender === 'bot') lastBotBubble = bubble;
    }

    function showTypingIndicator() {
        typingIndicator.style.display = 'block';
        requestAnimationFrame(() => {
            chatBox.scrollTo({
                top: chatBox.scrollHeight,
                behavior: 'smooth'
            });
        });
    }

    function hideTypingIndicator() {
        typingIndicator.style.display = 'none';
    }

    function updateLastBotMessage(text) {
        if (lastBotBubble) {
            const pattern = /\[(THOUGHT|REPLY|ERROR)[^\]]*\]([\s\S]*?)(?=\[(?:THOUGHT|REPLY|ERROR|STATE)|$)/g;
            let result = [];
            let match;
            while ((match = pattern.exec(text)) !== null) {
                const messageType = match[1];
                const plainText = match[2].trim();
                const safeText = escapeHtml(plainText).replace(/\n/g, '<br>');
                if (messageType === 'THOUGHT') {
                    result.push(`<div class="bot-thought">${safeText}</div>`);
                } else if (messageType === 'ERROR') {
                    result.push(`<div class="bot-error">${safeText || '服务暂时不可用，请稍后重试。'}</div>`);
                } else if (messageType === 'REPLY') {
                    const replyText = safeText;
                    
                    // 检查回复类型并应用不同样式
                    let styledReply = replyText;
                    if (plainText.includes('预约成功') || plainText.includes('已为您预约')) {
                        // 成功消息
                        styledReply = `<div class="bot-success">✅ ${replyText}</div>`;
                    } else if (plainText.includes('抱歉') || plainText.includes('失败') || plainText.includes('不空闲')) {
                        // 错误消息
                        styledReply = `<div class="bot-error">❌ ${replyText}</div>`;
                    } else if (plainText.includes('请问') || plainText.includes('需要')) {
                        // 询问消息
                        styledReply = `<div class="bot-info">💬 ${replyText}</div>`;
                    } else {
                        // 普通回复，使用突出的颜色
                        styledReply = `<div class="bot-reply">${replyText}</div>`;
                    }
                    
                    result.push(styledReply);
                }
            }
            if (!result.length && text.trim()) {
                result.push(`<div class="bot-reply">${escapeHtml(text.trim()).replace(/\n/g, '<br>')}</div>`);
            }
            lastBotBubble.innerHTML = result.join('');
            
            // 内容更新后自动滚动
            requestAnimationFrame(() => {
                chatBox.scrollTo({
                    top: chatBox.scrollHeight,
                    behavior: 'smooth'
                });
            });
        }
    }

    function escapeHtml(value) {
        return String(value || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function renderBotError(message) {
        if (!lastBotBubble) return;
        const safeMessage = escapeHtml(message || '抱歉，服务暂时不可用，请稍后再试。');
        lastBotBubble.innerHTML = `<div class="bot-error">${safeMessage}</div>`;
    }

    function hasVisibleBotMessage() {
        return Boolean(lastBotBubble && lastBotBubble.textContent.trim());
    }

    async function selectMessageRoute(text) {
        const res = await fetch('/api/chat/route', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: text, session_id: sessionId, owner_id: ownerId})
        });
        if (!res.ok) throw new Error('route selection failed');
        return await res.json();
    }

    function renderConsultationResponse(data) {
        const sources = data.sources || [];
        const sourceHtml = sources.length ? `
            <details style="margin-top: 12px;">
                <summary>知识库检索完成，找到 ${sources.length} 个来源</summary>
                <div style="margin-top: 8px; color: #475467; font-size: 13px;">
                    ${sources.map((source, idx) => `
                        <div style="margin-bottom: 8px;">
                            <strong>${idx + 1}. ${escapeHtml(source.title || '知识来源')}</strong><br>
                            <span>${escapeHtml(source.source || '')}</span>
                            ${source.page ? `<span> · 第 ${source.page} 页</span>` : ''}
                        </div>
                    `).join('')}
                </div>
            </details>
        ` : '<div style="margin-top: 12px; color: #667085; font-size: 13px;">知识库检索完成，暂无可展示来源</div>';

        lastBotBubble.innerHTML = `
            <div class="bot-reply">${escapeHtml(data.answer).replace(/\n/g, '<br>')}</div>
            ${sourceHtml}
        `;
    }

    async function callConsultationApi(text) {
        const res = await fetch('/api/consultation/query', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({question: text})
        });
        if (!res.ok) {
            const error = await res.json().catch(() => ({}));
            const detail = error.detail || {};
            lastBotBubble.innerHTML = `<div class="bot-error">知识检索服务当前不可用，请稍后重试。${detail.message ? '<br>' + escapeHtml(detail.message) : ''}</div>`;
            return;
        }
        const data = await res.json();
        renderConsultationResponse(data);
    }

    async function callStreamingAgent(text, route) {
        const res = await fetch('/chat/stream', {
            method: 'POST',
            headers: requestHeaders({csrf: true}),
            body: JSON.stringify({message: text, session_id: sessionId, owner_id: ownerId, route})
        });
        if (!res.ok) throw new Error(`chat_stream_http_${res.status}`);
        if (!res.body) throw new Error('chat_stream_body_unavailable');
        const reader = res.body.getReader();
        let botMsg = '';
        const decoder = new TextDecoder();
        while (true) {
            const {done, value} = await reader.read();
            if (done) break;
            botMsg += decoder.decode(value, {stream: true});
            updateLastBotMessage(botMsg);
        }
        botMsg += decoder.decode();
        if (!botMsg.trim()) throw new Error('chat_stream_empty');
        updateLastBotMessage(botMsg);
        return botMsg;
    }

    chatForm.onsubmit = async function(e) {
        e.preventDefault();
        const text = userInput.value.trim();
        if (!text) return;
        
        // 禁用发送按钮
        const sendBtn = document.getElementById('send-btn');
        sendBtn.disabled = true;
        sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 发送中...';
        
        addMessage(text, 'user');
        userInput.value = '';
        
        // 显示打字指示器
        showTypingIndicator();
        
        // 添加空的机器人消息
        addMessage('', 'bot');
        lastBotBubble = chatBox.querySelector('.message.bot:last-child .bubble');
        
        try {
            const routeResult = await selectMessageRoute(text);
            if (routeResult.route === 'consultation') {
                await callConsultationApi(text);
            } else {
                await callStreamingAgent(text, routeResult.route);
            }
        } catch (error) {
            renderBotError('抱歉，服务暂时不可用，请稍后再试。');
            console.error('Chat error:', error);
        } finally {
            hideTypingIndicator();
            if (!hasVisibleBotMessage()) {
                renderBotError('服务未返回有效内容，请稍后重试。');
            }
            // 恢复发送按钮
            sendBtn.disabled = false;
            sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i> 发送';
            userInput.focus();
        }
    }

    clearBtn.onclick = async function() {
        clearBtn.disabled = true;
        try {
            const res = await fetch('/api/chat/reset', {
                method: 'POST',
                headers: requestHeaders({csrf: true}),
                body: JSON.stringify({session_id: sessionId})
            });
            if (!res.ok) throw new Error('session reset failed');
            const data = await res.json();
            sessionId = data.session_id;
            window.localStorage.setItem(sessionStorageKey, sessionId);

            const welcomeMessage = chatBox.querySelector('.message.bot').cloneNode(true);
            chatBox.innerHTML = '';
            chatBox.appendChild(welcomeMessage);
            lastBotBubble = null;
        } catch (error) {
            console.error('Reset error:', error);
            window.alert('清空对话失败，请稍后重试。');
        } finally {
            clearBtn.disabled = false;
            userInput.focus();
        }
    }

    loginBtn.onclick = () => openAuthModal('login');
    registerBtn.onclick = () => openAuthModal('register');
    authClose.onclick = closeAuthModal;
    authModal.addEventListener('click', (event) => {
        if (event.target === authModal) closeAuthModal();
    });

    authForm.onsubmit = async function(event) {
        event.preventDefault();
        if (authMode === 'register' && authPassword.value !== authConfirmPassword.value) {
            authError.textContent = '两次输入的密码不一致。';
            return;
        }
        authSubmit.disabled = true;
        authError.textContent = '';
        const endpoint = authMode === 'register' ? '/api/auth/register' : '/api/auth/login';
        const body = {email: authEmail.value.trim(), password: authPassword.value};
        if (authMode === 'register') body.display_name = authDisplayName.value;
        try {
            const response = await fetch(endpoint, {
                method: 'POST',
                credentials: 'same-origin',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Chat-Session-ID': sessionId
                },
                body: JSON.stringify(body)
            });
            const payload = await response.json().catch(() => ({}));
            if (!response.ok) {
                authError.textContent = errorMessage(payload, '账户操作失败，请检查输入后重试。');
                return;
            }
            setSessionId(payload.data.session_id);
            setAccountState(payload.data.user);
            resetConversationView();
            closeAuthModal();
        } catch (error) {
            authError.textContent = '账户服务暂时不可用，请稍后重试。';
        } finally {
            authSubmit.disabled = false;
        }
    }

    logoutBtn.onclick = async function() {
        logoutBtn.disabled = true;
        try {
            const response = await fetch('/api/auth/logout', {
                method: 'POST',
                credentials: 'same-origin',
                headers: {
                    ...requestHeaders({csrf: true}),
                    'X-Chat-Session-ID': sessionId
                }
            });
            const payload = await response.json().catch(() => ({}));
            if (!response.ok) throw new Error(errorMessage(payload, '退出登录失败'));
            setSessionId(payload.data.session_id);
            setAccountState(null);
            resetConversationView();
        } catch (error) {
            window.alert(error.message || '退出登录失败，请稍后重试。');
        } finally {
            logoutBtn.disabled = false;
        }
    }
    
    // 添加回车键发送功能
    userInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            chatForm.dispatchEvent(new Event('submit'));
        }
    });
    
    // 页面加载完成后聚焦输入框
    window.addEventListener('load', async function() {
        try {
            await refreshAccountState();
        } catch (error) {
            authAvailable = false;
            setAccountState(null);
        }
        userInput.focus();
    });

    document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && !authModal.hidden) closeAuthModal();
    });
    </script>
</body>
</html>
