<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统状态 - AI Hair Salon Agent</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #172033;
            background: #f5f7fb;
        }
        .shell { max-width: 1080px; margin: 0 auto; padding: 40px 24px; }
        .header { margin-bottom: 28px; }
        .header h1 { margin: 0 0 8px; font-size: 30px; }
        .header p { margin: 4px 0; color: #667085; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 16px;
        }
        .card {
            background: white;
            border: 1px solid #e4e7ec;
            border-radius: 8px;
            padding: 20px;
        }
        .card h2 { margin: 0 0 12px; font-size: 16px; color: #475467; }
        .value { font-size: 20px; font-weight: 700; }
        .healthy, .configured { color: #087443; }
        .unavailable, .not_configured { color: #b54708; }
        .links { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 28px; }
        .links a {
            display: inline-block;
            padding: 10px 14px;
            border: 1px solid #2563eb;
            border-radius: 7px;
            color: #1d4ed8;
            background: white;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <main class="shell">
        <header class="header">
            <h1>理发店智能预约 AI Agent</h1>
            <p>版本：{{ version }}</p>
            <p>更新时间：{{ updated_at }}（北京时间）</p>
        </header>

        <section class="grid" aria-label="系统组件状态">
            <article class="card">
                <h2>应用服务</h2>
                <div class="value {{ status.app }}">{{ status.app }}</div>
            </article>
            <article class="card">
                <h2>SQLite 数据库</h2>
                <div class="value {{ status.database }}">{{ status.database }}</div>
            </article>
            <article class="card">
                <h2>MCP Knowledge Service</h2>
                <div class="value {{ status.mcp_rag }}">{{ status.mcp_rag }}</div>
            </article>
            <article class="card">
                <h2>RAG Collection</h2>
                <div class="value">{{ status.rag_collection }}</div>
            </article>
            <article class="card">
                <h2>LLM</h2>
                <div class="value {{ status.llm }}">{{ status.llm }}</div>
            </article>
        </section>

        <nav class="links" aria-label="系统入口">
            <a href="/">返回首页</a>
            <a href="/docs">Swagger</a>
            <a href="/knowledge">知识服务状态</a>
            <a href="/stylists">发型师状态</a>
            <a href="/stylist-schedule">发型师排班</a>
        </nav>
    </main>
</body>
</html>
